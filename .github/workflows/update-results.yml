name: Update results

# Fetches the latest World Cup results and commits data/results.json.
# GitHub Pages (serving from the main branch) then redeploys automatically.

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-results.js

      - name: Commit if changed
        run: |
          git config user.name  "results-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- data/results.json; then
            echo "No result changes."; exit 0
          fi
          git add data/results.json
          git commit -m "Update results ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Pushed."; exit 0
            fi
            echo "Push attempt $i failed, retrying…"; sleep 4
          done
          echo "Push failed after retries."; exit 1
